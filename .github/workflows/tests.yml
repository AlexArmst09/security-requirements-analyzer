name: Run Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pymupdf pyyaml pandas pytest
      - name: Install Kubescape
        run: curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash
      - name: Run Task 2 tests
        run: pytest task2_comparator/test_comparator.py -v
      - name: Run Task 3 tests
        run: pytest task3_executor/test_executor.py -v
        env:
          PATH: ${{ env.PATH }}:/root/.kubescape/bin:/home/runner/.kubescape/bin